# ============================================================
# TN Solar Site Visit — Netlify Deployment Configuration
# ============================================================

[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION            = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_DISABLE_SOURCEMAPS = "true"

# Netlify Next.js plugin — handles SSR, API routes, middleware
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Functions runtime ────────────────────────────────────────
[functions]
  node_bundler = "esbuild"

# ── Security & Cache Headers ─────────────────────────────────

# Long-lived cache for Next.js static chunks (content-hashed filenames)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-lived cache for public assets
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers on every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── Redirects ────────────────────────────────────────────────
# Root → dashboard (handled by Next.js middleware, but belt-and-suspenders)
[[redirects]]
  from   = "/"
  to     = "/dashboard"
  status = 301

# NOTE: Do NOT add a catch-all SPA redirect (/*  → /index.html).
# @netlify/plugin-nextjs handles all routing including SSR & API routes.
