# ============================================================
# TN Solar Site Visit — Netlify Deployment Configuration
# ============================================================

[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION            = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_DISABLE_SOURCEMAPS = "true"

# Netlify Next.js plugin — handles SSR, API routes, proxy/middleware
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Functions runtime (Node.js serverless functions) ─────────
[functions]
  node_bundler           = "esbuild"
  external_node_modules  = ["@supabase/supabase-js", "@supabase/ssr"]
  included_files         = ["public/**"]

# ── Edge Functions (proxy/middleware runtime) ─────────────────
# Force Node.js compatibility mode for the middleware edge function
# This prevents Deno runtime errors with @supabase/ssr
[edge_functions]
  node_compatibility = true

# ── Security & Cache Headers ─────────────────────────────────

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
